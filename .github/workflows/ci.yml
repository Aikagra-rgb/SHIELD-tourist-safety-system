name: SHIELD CI Quality Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test-backend:
    name: Backend CI Pipeline
    runs-on: ubuntu-latest

    services:
      # Although we mock redis/databases for unit testing, we setup Python tests directly
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - name: Check out repository code
      uses: actions/checkout@v3

    - name: Set up Python 3.11 Environment
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest httpx
        # Install scikit-learn requirements
        if [ -f smart-tourist-safety-system/backend-ai-service/requirements.txt ]; then
          pip install -r smart-tourist-safety-system/backend-ai-service/requirements.txt
        fi

    - name: Run Backend Pytest Suite
      run: |
        cd smart-tourist-safety-system/backend-ai-service
        pytest -v
